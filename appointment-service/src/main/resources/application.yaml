spring:
  application:
    name: appointment-service
  datasource:
    url: jdbc:postgresql://localhost:5432/appointment_db
    username: postgres
    password: 123456
  jpa:
    hibernate:
      ddl-auto: update

server:
  port: 8083
eureka:
  client:
    service-url:
      default: http://localhost:8761:eureka/
    fetch-registry: true
    register-with-eureka: true

logging:
  level:
    io:
      github:
        resilience4j=DEBUG

resilience4j:
  circuitbreaker:
    instances:
      doctorServiceCB:
        failureRateThreshold = 50
        minimumNumberOfCalls = 5
        waitDurationInOpenState = 10s
        permittedNumberOfCallsInHalfOpenState = 3
  retry:
    instances:
      patientRetry:
        maxAttempts = 3
        waitDuration = 200ms
        retryExceptions = org.springframework.web.client.ResourceAccessException
  rateLimiter:
    instances:
      searchDoctorLimit:
        limitForPeriod = 5
        limitRefreshPeriod = 10000ms
        timeoutDuration = 0