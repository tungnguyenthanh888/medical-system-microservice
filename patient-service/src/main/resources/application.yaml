spring:
  application:
    name: patient-service

  datasource:
    url: jdbc:postgresql://localhost:5432/patient_db
    username: postgres
    password: 123456
  jpa:
    hibernate:
      ddl-auto: update

server:
  port: 8081
eureka:
  client:
    service-url:
      default: http://localhost:8761:eureka/
    fetch-registry: true
    register-with-eureka: true
